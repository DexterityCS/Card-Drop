<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Drop Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;background:transparent!important;overflow:hidden;font-family:'Barlow Condensed',sans-serif;}
.card-wrap{position:absolute;bottom:60px;right:60px;display:flex;flex-direction:column;align-items:center;gap:10px;transform:translateX(500px);opacity:0;transition:transform .65s cubic-bezier(.22,.68,0,1.25),opacity .4s ease;pointer-events:none;}
.card-wrap.visible{transform:translateX(0);opacity:1;}
.card-wrap.hiding{transform:translateX(500px);opacity:0;transition:transform .5s cubic-bezier(.4,0,1,1),opacity .35s ease;}
.card-scene{width:260px;height:390px;perspective:1200px;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;}
.card-back{background:linear-gradient(145deg,#0d0d1c,#1a1a30);border:2px solid #2a2a50;}
.back-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;}
.back-stripe{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,.015) 8px,rgba(255,255,255,.015) 9px);}
.back-diamond{width:64px;height:64px;border:2px solid #2a2a55;transform:rotate(45deg);position:relative;z-index:1;}
.back-diamond-in{width:42px;height:42px;background:#1a1a38;border:1px solid #2a2a50;position:absolute;top:50%;left:50%;margin:-21px 0 0 -21px;}
.back-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:6px;color:#3a3a70;z-index:1;}
.back-sub{font-size:9px;letter-spacing:3px;color:#2a2a50;text-transform:uppercase;z-index:1;}
.card-front{transform:rotateY(180deg);display:flex;flex-direction:column;border:2.5px solid var(--cc,#9ca3b0);}
.card-front.lglow{animation:lglow 2s ease-in-out infinite;}
.card-front.eglow{animation:eglow 3s ease-in-out infinite;}
@keyframes lglow{0%,100%{box-shadow:0 0 14px 3px #f0c04055;}50%{box-shadow:0 0 30px 8px #f0c04088;}}
@keyframes eglow{0%,100%{box-shadow:0 0 10px 2px #c080fc33;}50%{box-shadow:0 0 22px 5px #c080fc66;}}
.holo{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:10;border-radius:12px;mix-blend-mode:screen;}
.card-inner.flipped .holo{opacity:1;animation:holoshift 4s linear infinite;}
.card-inner.flipped.legendary .holo{animation-duration:2s;}
.card-inner.flipped.epic .holo{opacity:.65;}
@keyframes holoshift{0%{background:linear-gradient(105deg,rgba(255,50,50,.08) 0%,rgba(255,180,0,.08) 20%,rgba(80,255,80,.08) 40%,rgba(0,180,255,.08) 60%,rgba(180,0,255,.08) 80%,transparent 100%);filter:hue-rotate(0deg);}50%{filter:hue-rotate(180deg);}100%{background:linear-gradient(105deg,rgba(255,50,50,.08) 0%,rgba(255,180,0,.08) 20%,rgba(80,255,80,.08) 40%,rgba(0,180,255,.08) 60%,rgba(180,0,255,.08) 80%,transparent 100%);filter:hue-rotate(360deg);}}
.card-top{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:var(--cb,#1a1a2e);flex-shrink:0;z-index:2;position:relative;}
.card-num{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.card-series{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.35);}
.card-rarity-pill{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--cc,#9ca3b0);background:rgba(0,0,0,.4);padding:2px 7px;border-radius:3px;}
.card-photo{flex:1;position:relative;overflow:hidden;background:var(--cpb,#0d1520);}
.card-photo canvas,.card-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.card-name-banner{position:absolute;bottom:0;left:0;right:0;padding:36px 12px 10px;background:linear-gradient(to top,rgba(0,0,0,.92),transparent);z-index:3;}
.card-player-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#fff;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,.9);}
.card-handle{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--cc,#9ca3b0);margin-top:2px;}
.card-bottom{height:28px;background:var(--ca,#111);display:flex;align-items:center;justify-content:space-between;padding:0 10px;flex-shrink:0;z-index:2;}
.card-team{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.3);}
.card-year{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);}
.redeemer-banner{text-align:center;animation:bannerIn .4s ease .2s both;}
@keyframes bannerIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.redeemer-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,1);}
.redeemer-rarity{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,1);}
.timer-bar{height:3px;background:rgba(255,255,255,.12);border-radius:2px;width:260px;}
.timer-fill{height:100%;border-radius:2px;background:#f0c040;transform-origin:left;transition:transform linear;}
#errMsg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(20,0,0,.92);border:1px solid #ff4444;color:#ff8888;font-size:12px;font-weight:700;letter-spacing:1px;padding:8px 18px;border-radius:6px;display:none;white-space:nowrap;}
</style>
</head>
<body>

<div class="card-wrap" id="cardWrap">
  <div class="card-scene">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-back">
        <div class="back-inner">
          <div class="back-stripe"></div>
          <div style="position:relative;width:64px;height:64px;z-index:1;">
            <div class="back-diamond"><div class="back-diamond-in"></div></div>
          </div>
          <div class="back-logo">STREAM</div>
          <div class="back-sub">Card Drop</div>
        </div>
      </div>
      <div class="card-face card-front" id="cardFront">
        <div class="holo"></div>
        <div class="card-top" id="cTop">
          <div class="card-num" id="cNum">#001</div>
          <div class="card-series" id="cSeries">BASE SERIES</div>
          <div class="card-rarity-pill" id="cPill">COMMON</div>
        </div>
        <div class="card-photo" id="cPhoto">
          <canvas id="artCanvas" width="256" height="302"></canvas>
          <div class="card-name-banner">
            <div class="card-player-name" id="cName">???</div>
            <div class="card-handle" id="cHandle">@handle</div>
          </div>
        </div>
        <div class="card-bottom" id="cBottom">
          <div class="card-team" id="cTeam">TEAM</div>
          <div class="card-year">2025</div>
        </div>
      </div>
    </div>
  </div>
  <div class="redeemer-banner">
    <div class="redeemer-name" id="redeemerName"></div>
    <div class="redeemer-rarity" id="redeemerRarity"></div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
</div>

<div id="errMsg"></div>

<script>
const RARITIES=[
  {name:'COMMON',   color:'#9ca3b0',weight:45,dots:1,stars:'●',idx:0,band:'#111622',accent:'#1c2030'},
  {name:'UNCOMMON', color:'#4ad48a',weight:28,dots:2,stars:'●●',idx:1,band:'#0d1f16',accent:'#122018'},
  {name:'RARE',     color:'#50a8f8',weight:17,dots:3,stars:'●●●',idx:2,band:'#0d1a2e',accent:'#101e32'},
  {name:'EPIC',     color:'#c080fc',weight:8, dots:4,stars:'◆◆◆◆',idx:3,band:'#1a0e2a',accent:'#1c1030'},
  {name:'LEGENDARY',color:'#f0c040',weight:2, dots:5,stars:'★★★★★',idx:4,band:'#201600',accent:'#221800'},
];
const EL={hype:{bg:'#1a0010',acc:'#ff40aa'},dark:{bg:'#080810',acc:'#8888cc'},psychic:{bg:'#130013',acc:'#dd44ee'},grass:{bg:'#001808',acc:'#55dd00'},ghost:{bg:'#080818',acc:'#6666ff'},water:{bg:'#001020',acc:'#00aaff'},fire:{bg:'#1a0800',acc:'#ff6600'},electric:{bg:'#0a0a00',acc:'#ffee00'},normal:{bg:'#0a0a0a',acc:'#888888'}};

const params=new URLSearchParams(window.location.search);
const CLIENT_ID  =params.get('cid') ||localStorage.getItem('cfg_client_id')||'';
const CHANNEL    =params.get('ch')  ||localStorage.getItem('cfg_channel_name')||'';
const REWARD     =params.get('rw')  ||localStorage.getItem('cfg_reward_name')||'Card Drop';
const DISPLAY_SEC=parseInt(params.get('sec')||'12',10);

// extract token from URL hash if present (embedded by config page on first copy)
(function(){
  const hash=window.location.hash;
  if(!hash)return;
  const hp=new URLSearchParams(hash.slice(1));
  const t=hp.get('t');
  if(t){
    localStorage.setItem('twitch_token',t);
    // clean the token out of the URL so it's not visible in SLOBS
    window.history.replaceState(null,'',window.location.pathname+window.location.search);
  }
})();

let PLAYERS=[];
try{const raw=localStorage.getItem('card_drop_players');if(raw)PLAYERS=JSON.parse(raw);}catch(e){}

let token=localStorage.getItem('twitch_token');
let broadcasterId=null,esSocket=null,hideTimer=null;

function showErr(msg){const el=document.getElementById('errMsg');el.textContent=msg;el.style.display='block';}

async function fetchBroadcasterId(){
  const r=await fetch('https://api.twitch.tv/helix/users?login='+CHANNEL,{headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+token}});
  if(!r.ok)throw new Error('auth_fail');
  const d=await r.json();
  const id=d.data[0]?.id;if(!id)throw new Error('no_user');
  return id;
}

function openES(){
  if(esSocket)esSocket.close();
  esSocket=new WebSocket('wss://eventsub.wss.twitch.tv/ws');
  esSocket.onmessage=async(e)=>{
    const msg=JSON.parse(e.data),type=msg.metadata?.message_type;
    if(type==='session_welcome'){
      await fetch('https://api.twitch.tv/helix/eventsub/subscriptions',{method:'POST',headers:{'Client-Id':CLIENT_ID,'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({type:'channel.channel_points_custom_reward_redemption.add',version:'1',condition:{broadcaster_user_id:broadcasterId},transport:{method:'websocket',session_id:msg.payload.session.id}})});
    } else if(type==='notification'){
      const evt=msg.payload.event;
      if(evt&&evt.reward?.title===REWARD)triggerCard(evt.user_name||evt.user_login||'Viewer');
    } else if(type==='session_reconnect'){
      esSocket.close();esSocket=new WebSocket(msg.payload.session.reconnect_url);
    }
  };
  esSocket.onclose=(e)=>{if(e.code!==1000)setTimeout(openES,5000);};
}

function drawArt(canvas,player,rarity){
  const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;
  const pal=EL[player.el||'normal']||EL.normal;
  const bg=player.photoBg||pal.bg,acc=player.photoAcc||pal.acc||rarity.color;
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(w*.65+i*28,0);ctx.lineTo(w+20,h*.35+i*20);ctx.lineTo(w+20,0);ctx.closePath();ctx.fillStyle=acc+'10';ctx.fill();}
  ctx.strokeStyle=acc+'0a';ctx.lineWidth=1;
  for(let x=0;x<w;x+=22){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=22){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  const cx=w*.44,cy=h*.44;
  ctx.beginPath();ctx.ellipse(cx,cy+18,36,52,0,0,Math.PI*2);ctx.fillStyle=acc+'18';ctx.fill();
  ctx.beginPath();ctx.moveTo(cx-26,cy+58);ctx.lineTo(cx-30,cy+4);ctx.lineTo(cx-16,cy-8);ctx.lineTo(cx,cy-4);ctx.lineTo(cx+16,cy-8);ctx.lineTo(cx+30,cy+4);ctx.lineTo(cx+26,cy+58);ctx.closePath();ctx.fillStyle=acc+'55';ctx.fill();ctx.strokeStyle=acc+'aa';ctx.lineWidth=1.5;ctx.stroke();
  ctx.font="bold 22px 'Bebas Neue',sans-serif";ctx.fillStyle=acc+'cc';ctx.textAlign='center';ctx.fillText(String(player.id||1).padStart(2,'0'),cx,cy+26);
  ctx.beginPath();ctx.arc(cx,cy-22,17,0,Math.PI*2);ctx.fillStyle=acc+'44';ctx.fill();ctx.strokeStyle=acc+'88';ctx.lineWidth=1.5;ctx.stroke();
  for(const[ox,oy,r]of[[-9,-26,5],[9,-26,5]]){ctx.beginPath();ctx.arc(cx+ox,cy+oy,r,0,Math.PI*2);ctx.fillStyle=acc+'bb';ctx.fill();ctx.beginPath();ctx.arc(cx+ox,cy+oy,2.5,0,Math.PI*2);ctx.fillStyle='#000a';ctx.fill();}
  ctx.lineWidth=8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-30,cy+4);ctx.lineTo(cx-46,cy+22);ctx.lineTo(cx-38,cy+32);ctx.strokeStyle=acc+'55';ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+30,cy+4);ctx.lineTo(cx+46,cy+22);ctx.lineTo(cx+38,cy+32);ctx.stroke();
  ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(cx-12,cy+58);ctx.lineTo(cx-15,cy+86);ctx.strokeStyle=acc+'44';ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+12,cy+58);ctx.lineTo(cx+15,cy+86);ctx.stroke();
  ctx.lineCap='butt';ctx.lineWidth=1;
  if(rarity.idx===4){ctx.save();ctx.translate(w-22,22);ctx.beginPath();for(let a=0;a<Math.PI*2;a+=Math.PI/5){const r1=10,r2=4,x1=Math.cos(a)*r1,y1=Math.sin(a)*r1,x2=Math.cos(a+Math.PI/5)*r2,y2=Math.sin(a+Math.PI/5)*r2;if(a===0)ctx.moveTo(x1,y1);else ctx.lineTo(x1,y1);ctx.lineTo(x2,y2);}ctx.closePath();ctx.fillStyle='#f0c040cc';ctx.fill();ctx.restore();}
}

function pickRarity(){const tot=RARITIES.reduce((s,r)=>s+r.weight,0);let r=Math.random()*tot;for(const R of RARITIES){r-=R.weight;if(r<=0)return R;}return RARITIES[0];}
function pickPlayer(rname){const pool=PLAYERS.filter(p=>p.rarity===rname);if(!pool.length)return PLAYERS.length?PLAYERS[Math.floor(Math.random()*PLAYERS.length)]:null;return pool[Math.floor(Math.random()*pool.length)];}

function triggerCard(username){
  if(!PLAYERS.length)return;
  if(hideTimer)clearTimeout(hideTimer);
  const rarity=pickRarity(),player=pickPlayer(rarity.name);if(!player)return;
  const front=document.getElementById('cardFront'),inner=document.getElementById('cardInner'),wrap=document.getElementById('cardWrap');
  front.style.setProperty('--cc',rarity.color);front.style.borderColor=rarity.color;
  front.className='card-face card-front'+(rarity.name==='LEGENDARY'?' lglow':rarity.name==='EPIC'?' eglow':'');
  inner.className='card-inner';
  document.getElementById('cNum').textContent='#'+String(player.id).padStart(3,'0');
  document.getElementById('cSeries').textContent=(player.series||'BASE')+' SERIES';
  document.getElementById('cPill').textContent=rarity.stars+' '+rarity.name;
  document.getElementById('cPill').style.color=rarity.color;
  document.getElementById('cTop').style.background=rarity.band;
  document.getElementById('cBottom').style.background=rarity.accent;
  document.getElementById('cTeam').textContent=(player.team||'').toUpperCase();
  document.getElementById('redeemerName').textContent='@'+username;
  document.getElementById('redeemerRarity').textContent=rarity.stars+' '+rarity.name+' PULL!';
  document.getElementById('redeemerRarity').style.color=rarity.color;
  const photo=document.getElementById('cPhoto');
  photo.style.background=player.photoBg||'#0d1520';
  if(player.image){
    photo.innerHTML='<img src="'+player.image+'" style="width:100%;height:100%;object-fit:cover;display:block;"><div class="card-name-banner"><div class="card-player-name">'+player.name.toUpperCase()+'</div><div class="card-handle" style="color:'+rarity.color+'">'+player.handle+'</div></div>';
  } else {
    photo.innerHTML='<canvas id="artCanvas" width="256" height="302"></canvas><div class="card-name-banner"><div class="card-player-name">'+player.name.toUpperCase()+'</div><div class="card-handle" style="color:'+rarity.color+'">'+player.handle+'</div></div>';
    drawArt(document.getElementById('artCanvas'),player,rarity);
  }
  wrap.classList.remove('hiding');
  requestAnimationFrame(()=>requestAnimationFrame(()=>wrap.classList.add('visible')));
  setTimeout(()=>inner.classList.add('flipped'),1200);
  const fill=document.getElementById('timerFill');
  fill.style.transition='none';fill.style.transform='scaleX(1)';
  setTimeout(()=>{fill.style.transition='transform '+DISPLAY_SEC+'s linear';fill.style.transform='scaleX(0)';},100);
  hideTimer=setTimeout(()=>{wrap.classList.add('hiding');wrap.classList.remove('visible');setTimeout(()=>inner.classList.remove('flipped'),600);},DISPLAY_SEC*1000);
}

async function init(){
  if(!CLIENT_ID||!CHANNEL){showErr('Invalid overlay URL — go back to the config page and copy a fresh overlay URL.');return;}
  if(!token){showErr('No auth token — go back to the config page, reconnect with Twitch, then copy a fresh overlay URL.');return;}
  try{
    broadcasterId=await fetchBroadcasterId();
    openES();
  }catch(e){
    if(e.message==='auth_fail')showErr('Token expired — go back to the config page, reconnect with Twitch, and copy a fresh overlay URL.');
    else showErr('Could not find channel: '+CHANNEL);
  }
}

init();
</script>
</body>
</html>
